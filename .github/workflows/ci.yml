name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          set -euxo pipefail
          cd frontend
          echo "Running install command: npm ci"
          npm ci

      - name: Run frontend tests with hard timeout
        run: |
          set -euxo pipefail
          cd frontend
          echo "Running test command (CI, non-watch): npm run test:coverage:ci"
          echo "Applying shell hard timeout: 9m"
          echo "Test step start: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --foreground 9m npm run test:coverage:ci
          exit_code=$?
          set -e
          echo "Test step end: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          if [ "$exit_code" -eq 124 ]; then
            echo "Frontend tests were terminated by GNU timeout after 9 minutes." >&2
            echo "Active node-related processes at timeout:" >&2
            set +e
            ps -ef | grep -E 'node|vitest|v8' | grep -v grep >&2
            set -e
            exit 124
          fi
          exit "$exit_code"

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDM
        run: python -m pip install --upgrade pip pdm

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Ensure pdm.lock exists
        run: |
          test -f backend/pdm.lock || (echo 'backend/pdm.lock is missing' >&2; exit 1)

      - name: Install backend dependencies with PDM
        run: |
          cd backend
          pdm install -dG test

      - name: Run backend tests
        run: |
          cd backend
          pdm run compilemessages
          pdm run test

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDM
        run: python -m pip install --upgrade pip pdm

      - name: Install backend dependencies with PDM
        run: |
          cd backend
          pdm install -dG test -dG quality

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install --force

      - name: Run quality gate
        run: make quality

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: reports/
