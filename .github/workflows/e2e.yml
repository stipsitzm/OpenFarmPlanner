name: E2E (production build)

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend (production build)
        run: npm run build
        working-directory: frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chrome-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browser (Chrome)
        # The Playwright CDN download (esp. the bundled FFmpeg) has been observed to
        # stall indefinitely after reaching 100% instead of erroring out, silently
        # burning the whole job timeout. Two mitigations:
        # 1. PLAYWRIGHT_DOWNLOAD_HOST forces the direct storage-bucket mirror instead
        #    of the default Azure-routed ones (both prefixed /dbazure/), which is
        #    where the stalls were observed.
        # 2. Bound each attempt and retry instead of relying on a single unbounded
        #    download; the step timeout must fit attempts * per-attempt timeout with
        #    margin for apt-get, or a stuck last attempt gets killed by the step
        #    timeout before the loop's own logic can report failure.
        timeout-minutes: 15
        working-directory: frontend
        env:
          PLAYWRIGHT_DOWNLOAD_HOST: https://cdn.playwright.dev
        run: |
          set -e
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            if timeout 180 npx playwright install --with-deps chrome; then
              exit 0
            fi
            echo "Playwright browser install attempt $attempt/$max_attempts failed or timed out, retrying..." >&2
          done
          echo "Playwright browser install failed after $max_attempts attempts" >&2
          exit 1

      - name: Run E2E tests against the production build
        run: npx playwright test
        working-directory: frontend

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
